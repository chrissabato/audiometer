<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mic Level Meter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      transition: background-color 1s ease;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .layout {
      width: 100%;
      height: 100%;
      max-width: calc(100vh * 16 / 9);
      max-height: calc(100vw * 9 / 16);
      display: grid;
      grid-template-rows: auto 1fr auto auto;
      padding: 2vh 2vw;
      position: relative;
    }

    /* ── Header ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 1.5vh;
    }

    h1 {
      font-size: clamp(1rem, 2vw, 1.6rem);
      color: #fff;
      font-weight: 600;
    }

    .target-badge {
      font-size: clamp(0.75rem, 1.2vw, 1rem);
      color: #888;
      background: #0d0d1a;
      border: 1px solid #333;
      padding: 4px 14px;
      border-radius: 20px;
    }

    /* ── Cog button ── */
    #cogBtn {
      position: fixed;
      top: 2vh;
      right: 2vw;
      width: clamp(52px, 7vw, 96px);
      height: clamp(52px, 7vw, 96px);
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 2px solid #333;
      color: #888;
      font-size: clamp(26px, 3.5vw, 52px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.4s;
      z-index: 50;
      line-height: 1;
    }

    #cogBtn:hover {
      background: rgba(255,255,255,0.12);
      border-color: #555;
      color: #fff;
    }

    #cogBtn.spinning { transform: rotate(90deg); }

    /* ── LUFS display ── */
    .lufs-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .lufs-display {
      font-size: clamp(5rem, 18vw, 16rem);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #fff;
      line-height: 1;
      white-space: nowrap;
    }

    .lufs-display span {
      font-size: clamp(1rem, 2.5vw, 2.2rem);
      color: #888;
      font-weight: 400;
      margin-left: 0.3em;
    }

    .device-name {
      font-size: clamp(0.75rem, 1.4vw, 1.1rem);
      color: #555;
      margin-top: 1vh;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 80%;
    }

    /* ── Meter ── */
    .meter-section { padding: 1vh 0; }

    .meter-wrapper {
      position: relative;
      height: clamp(84px, 12vh, 168px);
      background: #0d0d1a;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #333;
      margin-bottom: 6px;
    }

    .meter-fill {
      height: 100%;
      width: 0%;
      border-radius: 5px;
      transition: width 0.45s ease-out, background 0.3s;
      background: #4caf50;
    }

    .target-line {
      position: absolute;
      top: 0; bottom: 0;
      width: 2px;
      background: #fff;
      z-index: 2;
    }

    .target-label {
      position: absolute;
      top: -20px;
      transform: translateX(-50%);
      font-size: 0.7rem;
      color: #ccc;
      white-space: nowrap;
    }

    .scale {
      display: flex;
      justify-content: space-between;
      font-size: clamp(0.55rem, 0.9vw, 0.8rem);
      color: #666;
      padding: 0 2px;
    }

    /* ── Graph row ── */
    .graph-row {
      padding-top: 1.5vh;
      border-top: 1px solid #2a2a40;
    }

    .graph-wrapper {
      background: #0d0d1a;
      border: 1px solid #333;
      border-radius: 8px;
      overflow: hidden;
      height: clamp(100px, 20vh, 240px);
    }

    canvas { display: block; width: 100%; height: 100%; }

    #errorMsg {
      color: #f44336;
      font-size: clamp(0.8rem, 1.5vw, 1.1rem);
      padding-top: 0.5vh;
      display: none;
    }

    /* ── Full-page device picker overlay ── */
    #deviceOverlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #0d0d1a;
      flex-direction: column;
    }

    #deviceOverlay.open { display: flex; }

    .overlay-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: clamp(16px, 3vh, 40px) clamp(20px, 4vw, 60px);
      border-bottom: 1px solid #2a2a40;
      flex-shrink: 0;
    }

    .overlay-title {
      font-size: clamp(1.2rem, 3vw, 2.8rem);
      font-weight: 600;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    #closeOverlayBtn {
      font-size: clamp(1.8rem, 4vw, 4rem);
      background: transparent;
      border: none;
      color: #555;
      cursor: pointer;
      line-height: 1;
      padding: 0 0.2em;
      transition: color 0.2s;
    }

    #closeOverlayBtn:hover { color: #fff; }

    .device-list {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .device-option {
      flex: 1;
      min-height: 0;
      width: 100%;
      padding: 0 clamp(20px, 4vw, 60px);
      font-size: clamp(1.4rem, 3.5vw, 4rem);
      font-weight: 600;
      text-align: left;
      background: transparent;
      color: #888;
      border: none;
      border-bottom: 1px solid #1a1a30;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      display: flex;
      align-items: center;
    }

    .device-option:last-child { border-bottom: none; }
    .device-option:hover { background: #161630; color: #fff; }
    .device-option.selected { color: #fff; background: #12122a; }

    .device-option .check {
      margin-right: 0.6em;
      color: #4361ee;
      opacity: 0;
      font-size: 0.8em;
    }

    .device-option.selected .check { opacity: 1; }
  </style>
</head>
<body>

  <button id="cogBtn" onclick="openOverlay()">&#9881;</button>

  <div class="layout">
    <div class="header">
      <div style="display:flex;align-items:center;gap:1vw;">
        <div class="target-badge">Target &minus;24 LUFS</div>
        <div class="device-name" id="deviceName">Default Microphone</div>
      </div>
    </div>

    <div class="lufs-section">
      <div class="lufs-display" id="lufsValue">-- <span>LUFS</span></div>
    </div>

    <div class="meter-section">
      <div class="meter-wrapper">
        <div class="meter-fill" id="meterFill"></div>
        <div class="target-line" id="targetLine">
          <div class="target-label">-24</div>
        </div>
      </div>
      <div class="scale">
        <span>&minus;60</span><span>&minus;48</span><span>&minus;36</span>
        <span>&minus;24</span><span>&minus;12</span><span>0</span>
      </div>
    </div>

    <div class="graph-row">
      <div class="graph-wrapper">
        <canvas id="historyGraph"></canvas>
      </div>
      <div id="errorMsg"></div>
    </div>
  </div>

  <div id="deviceOverlay">
    <div class="overlay-header">
      <div class="overlay-title">Select Audio Input</div>
      <button id="closeOverlayBtn" onclick="closeOverlay()">&times;</button>
    </div>
    <div class="device-list" id="deviceList"></div>
  </div>

  <script>
    const TARGET_LUFS = -24;
    const METER_MIN   = -60;
    const METER_MAX   = 0;
    const WINDOW_SECONDS  = 3;
    const DISPLAY_INTERVAL = 500;
    const SAMPLE_INTERVAL  = 50;
    const GRAPH_SECONDS    = 30;

    let audioCtx, analyser, source, stream, kWeightStage1, kWeightStage2;
    let sampleTimer, displayTimer;
    let rmsHistory  = [];
    let graphHistory = [];

    let selectedDeviceId    = '';
    let selectedDeviceLabel = 'Default Microphone';
    let audioDevices = [];

    // ── Canvas ───────────────────────────────────────────────
    const canvas = document.getElementById('historyGraph');
    const ctx    = canvas.getContext('2d');

    function sizeCanvas() {
      const rect = canvas.parentElement.getBoundingClientRect();
      canvas.width  = rect.width  * devicePixelRatio;
      canvas.height = rect.height * devicePixelRatio;
      drawGraph();
    }
    window.addEventListener('resize', sizeCanvas);
    requestAnimationFrame(() => requestAnimationFrame(sizeCanvas));

    document.getElementById('targetLine').style.left =
      ((TARGET_LUFS - METER_MIN) / (METER_MAX - METER_MIN)) * 100 + '%';

    // ── Error display ────────────────────────────────────────
    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = msg ? 'block' : 'none';
    }

    // ── Device overlay ───────────────────────────────────────
    function openOverlay() {
      document.getElementById('cogBtn').classList.add('spinning');
      document.getElementById('deviceOverlay').classList.add('open');
    }

    function closeOverlay() {
      document.getElementById('cogBtn').classList.remove('spinning');
      document.getElementById('deviceOverlay').classList.remove('open');
    }

    function renderDeviceList() {
      const list = document.getElementById('deviceList');
      list.innerHTML = '';
      const all = [{ deviceId: '', label: 'Default Microphone' }, ...audioDevices];
      all.forEach(d => {
        const btn = document.createElement('button');
        btn.className = 'device-option' + (selectedDeviceId === d.deviceId ? ' selected' : '');
        const check = document.createElement('span');
        check.className = 'check';
        check.textContent = '✓';
        btn.appendChild(check);
        btn.appendChild(document.createTextNode(d.label));
        btn.onclick = () => selectDevice(d.deviceId, d.label);
        list.appendChild(btn);
      });
    }

    async function enumerateDevices() {
      try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        audioDevices = devices
          .filter(d => d.kind === 'audioinput')
          .map((d, i) => ({ deviceId: d.deviceId, label: d.label || `Microphone ${i + 1}` }));
        renderDeviceList();
      } catch (e) {}
    }

    async function selectDevice(deviceId, label) {
      selectedDeviceId    = deviceId;
      selectedDeviceLabel = label;
      document.getElementById('deviceName').textContent = label;
      renderDeviceList();
      closeOverlay();
      // Restart audio with new device
      await stopAudio();
      await startAudio();
    }

    navigator.mediaDevices.addEventListener('devicechange', enumerateDevices);

    // ── Audio ────────────────────────────────────────────────
    function collectSample() {
      const buf = new Float32Array(analyser.fftSize);
      analyser.getFloatTimeDomainData(buf);
      let sum = 0;
      for (let i = 0; i < buf.length; i++) sum += buf[i] * buf[i];
      const now = performance.now();
      rmsHistory.push({ time: now, ms: sum / buf.length });
      const cutoff = now - WINDOW_SECONDS * 1000;
      while (rmsHistory.length && rmsHistory[0].time < cutoff) rmsHistory.shift();
    }

    function updateDisplay() {
      if (!rmsHistory.length) return;
      let total = 0;
      for (const s of rmsHistory) total += s.ms;
      const lufs = -0.691 + 10 * Math.log10(Math.max(total / rmsHistory.length, 1e-20));
      const clamped = Math.max(METER_MIN, Math.min(METER_MAX, lufs));
      const pct = ((clamped - METER_MIN) / (METER_MAX - METER_MIN)) * 100;

      const fill = document.getElementById('meterFill');
      fill.style.width = pct + '%';

      if (lufs <= METER_MIN) {
        document.body.style.backgroundColor = '#1a1a2e';
      } else if (lufs > -20) {
        fill.style.background = '#f44336';
        document.body.style.backgroundColor = '#2e1a1a';
      } else if (lufs < -28) {
        fill.style.background = '#ff9800';
        document.body.style.backgroundColor = '#2e261a';
      } else {
        fill.style.background = '#4caf50';
        document.body.style.backgroundColor = '#1a2e1e';
      }

      document.getElementById('lufsValue').innerHTML =
        (lufs <= METER_MIN ? '--' : Math.round(lufs)) + ' <span>LUFS</span>';

      graphHistory.push({ time: performance.now(), lufs });
      const cut = performance.now() - (GRAPH_SECONDS + 2) * 1000;
      while (graphHistory.length && graphHistory[0].time < cut) graphHistory.shift();
      drawGraph();
    }

    function stopAudio() {
      clearInterval(sampleTimer);
      clearInterval(displayTimer);
      if (stream)   stream.getTracks().forEach(t => t.stop());
      if (audioCtx) audioCtx.close();
      stream = audioCtx = analyser = source = kWeightStage1 = kWeightStage2 = null;
      rmsHistory = [];
      document.getElementById('meterFill').style.width = '0%';
      document.getElementById('lufsValue').innerHTML = '-- <span>LUFS</span>';
      document.body.style.backgroundColor = '#1a1a2e';
    }

    async function startAudio() {
      showError('');
      try {
        const constraints = selectedDeviceId
          ? { audio: { deviceId: { exact: selectedDeviceId } } }
          : { audio: true };
        stream = await navigator.mediaDevices.getUserMedia(constraints);
      } catch (err) {
        // Fall back to default if specific device fails
        if (selectedDeviceId) {
          try {
            stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          } catch (e) {
            showError('Microphone access failed: ' + e.message);
            return;
          }
        } else {
          showError('Microphone access failed: ' + err.message);
          return;
        }
      }

      // Permission granted — get real device labels
      enumerateDevices();

      audioCtx = new AudioContext();
      if (audioCtx.state === 'suspended') await audioCtx.resume();

      kWeightStage1 = audioCtx.createBiquadFilter();
      kWeightStage1.type = 'highshelf';
      kWeightStage1.frequency.value = 1500;
      kWeightStage1.gain.value = 4.0;

      kWeightStage2 = audioCtx.createBiquadFilter();
      kWeightStage2.type = 'highpass';
      kWeightStage2.frequency.value = 60;
      kWeightStage2.Q.value = 0.5;

      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 4096;

      source = audioCtx.createMediaStreamSource(stream);
      source.connect(kWeightStage1);
      kWeightStage1.connect(kWeightStage2);
      kWeightStage2.connect(analyser);

      rmsHistory = [];
      sampleTimer  = setInterval(collectSample,    SAMPLE_INTERVAL);
      displayTimer = setInterval(updateDisplay, DISPLAY_INTERVAL);
    }

    // ── Graph ────────────────────────────────────────────────
    function drawGraph() {
      const w = canvas.width  / devicePixelRatio;
      const h = canvas.height / devicePixelRatio;
      const pad = { top: 6, bottom: 16, left: 30, right: 8 };
      const plotW = w - pad.left - pad.right;
      const plotH = h - pad.top  - pad.bottom;

      ctx.clearRect(0, 0, w, h);
      const yFor = lufs => pad.top + ((lufs - METER_MAX) / (METER_MIN - METER_MAX)) * plotH;

      ctx.strokeStyle = '#222'; ctx.lineWidth = 1;
      ctx.fillStyle = '#555'; ctx.font = '9px sans-serif';
      ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
      for (let db = 0; db >= METER_MIN; db -= 12) {
        const y = yFor(db);
        ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(w - pad.right, y); ctx.stroke();
        ctx.fillText(db, pad.left - 3, y);
      }

      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      for (let s = 0; s <= GRAPH_SECONDS; s += 5) {
        const x = pad.left + (1 - s / GRAPH_SECONDS) * plotW;
        ctx.fillText(s === 0 ? 'now' : `-${s}s`, x, h - pad.bottom + 3);
      }

      const ty = yFor(TARGET_LUFS);
      ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.setLineDash([4, 4]);
      ctx.beginPath(); ctx.moveTo(pad.left, ty); ctx.lineTo(w - pad.right, ty); ctx.stroke();
      ctx.setLineDash([]);

      if (graphHistory.length < 2) return;
      const now = graphHistory[graphHistory.length - 1].time;
      const startTime = now - GRAPH_SECONDS * 1000;

      ctx.beginPath();
      let started = false;
      for (const pt of graphHistory) {
        if (pt.time < startTime) continue;
        const x = pad.left + ((pt.time - startTime) / (GRAPH_SECONDS * 1000)) * plotW;
        const y = yFor(Math.max(METER_MIN, Math.min(METER_MAX, pt.lufs)));
        if (!started) { ctx.moveTo(x, y); started = true; } else { ctx.lineTo(x, y); }
      }
      ctx.strokeStyle = '#4caf50'; ctx.lineWidth = 1.5; ctx.stroke();

      if (started) {
        const last  = graphHistory[graphHistory.length - 1];
        const lastX = pad.left + ((last.time - startTime) / (GRAPH_SECONDS * 1000)) * plotW;
        ctx.lineTo(lastX, pad.top + plotH);
        let firstX = pad.left;
        for (const pt of graphHistory) {
          if (pt.time >= startTime) {
            firstX = pad.left + ((pt.time - startTime) / (GRAPH_SECONDS * 1000)) * plotW;
            break;
          }
        }
        ctx.lineTo(firstX, pad.top + plotH);
        ctx.closePath();
        ctx.fillStyle = 'rgba(76,175,80,0.1)'; ctx.fill();
      }
    }

    // ── Boot ─────────────────────────────────────────────────
    startAudio();
  </script>
</body>
</html>
